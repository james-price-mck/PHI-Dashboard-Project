# Build static site and deploy to GitHub Pages. Refresh the source URLs below (and
# etl/expected_reconciliation.json) when the upstream workbooks are republished.
name: Build and deploy to GitHub Pages

# Align with GitHub’s migration off Node 20 for Actions internals (by Sept 2026). First-party
# actions are bumped below; this opt-in is harmless if already on Node-24–based action releases.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 5 1 * *" # monthly — update URLs below when APRA / DoH publish a new quarter
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r etl/requirements.txt

      - name: Download source workbooks (APRA + DoH)
        # health.gov.au's CDN intermittently resets HTTP/2 connections from GitHub-hosted
        # runners with curl's default settings (INTERNAL_ERROR / err 2). Force HTTP/1.1,
        # send a browser-looking User-Agent, and retry with backoff to ride that out.
        # Also sanity-check each file is non-trivial (>= 100 KB) so a truncated or
        # HTML-error response cannot silently feed a garbage xlsx into the ETL.
        # URLs are pinned to the Dec-2025 editions; refresh alongside
        # etl/expected_reconciliation.json when new quarters publish.
        run: |
          set -euo pipefail
          mkdir -p data/raw
          fetch() {
            local url="$1" out="$2"
            echo "==> $out"
            curl -fL --http1.1 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) PHI-Dashboard-CI/1.0" \
              --retry 5 --retry-delay 5 --retry-all-errors \
              --connect-timeout 30 --max-time 300 \
              -o "$out" "$url"
            size=$(stat -c%s "$out")
            if [ "$size" -lt 102400 ]; then
              echo "ERROR: $out is only $size bytes — refusing to continue." >&2
              exit 1
            fi
            echo "    ok ($size bytes)"
          }
          fetch "https://www.apra.gov.au/sites/default/files/2026-02/Quarterly%20Private%20Health%20Insurance%20Membership%20Trends%20December%202025.xlsx" data/raw/membership_trends.xlsx
          fetch "https://www.apra.gov.au/sites/default/files/2026-02/Quarterly%20Private%20Health%20Insurance%20Membership%20and%20Benefits%20December%202025.xlsx" data/raw/membership_benefits.xlsx
          fetch "https://www.health.gov.au/sites/default/files/2026-03/private-health-insurance-reform-data-quarterly-trends-report.xlsx" data/raw/phi_reform_trends.xlsx

      - name: Fetch ABS ERP 5-year age bands (SDMX)
        # Curates data/curated/abs_erp_national_5y.csv via the ABS Data API.
        run: |
          mkdir -p data/curated
          python etl/fetch_abs_erp.py --out data/curated/abs_erp_national_5y.csv

      - name: Build dashboard data
        run: |
          python etl/build_dashboard_data.py \
            --xlsx data/raw/membership_trends.xlsx \
            --membership-benefits data/raw/membership_benefits.xlsx \
            --abs-erp data/curated/abs_erp_national_5y.csv \
            --tier-xlsx data/raw/phi_reform_trends.xlsx \
            --out public/data/dashboard.json
        # Reconciliation uses etl/expected_reconciliation.json (must match workbook vintage).

      - uses: actions/setup-node@v6
        with:
          # Runtime for Vite build (LTS; not the same as Actions’ internal Node, but 22+ is supported).
          node-version: "22"
          # Re-enable with `cache: npm` after committing package-lock.json from `npm install`.

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build site
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
